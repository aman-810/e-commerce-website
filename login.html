<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
  *{
    margin:0px;
    padding:0px;
  }
  h1{
    color:orange;
    text-align:center;
    margin-top:30px;
  }
  #form{
    min-height:500px;
    width:380px;
    background:rgba(240,240,240,1);
    margin:50px auto;
    border-radius:10px;
    box-shadow:5px 5px 10px 1px black;
    padding:25px 15px;
    box-sizing:border-box;
    text-align:center;
  }
  input{
    height:50px;
    width:100%;
    border-radius:10px;
    padding:5px 15px;
    box-sizing:border-box;
    font-size:20px;
    border:none;
  }
  #forget{
    margin-right:-200px;
  }
  button{
    background:linear-gradient(orange,red);
    width:100%;
    height:50px;
    color:white;
    border:none;
    border-radius:25px;
    padding:10px;
    box-sizing:border-box;
    font-size:25px;
    font-weight:bold;
    transition:0.8s;
  }
  button:hover{
    scale:1.04;
    transition:0.8s;
  }
  #box{
    height:50px;
    width:100%;
    color:white;
    padding:5px 0px;
  }
  .box1{
    height:100%;
    width:150px;;
    background:blue;
    float:left;
    border-radius:10px;
    padding:10px 0px;
    box-sizing:border-box;
    font-size:20px;
  }
  .box2{
    height:100%;
    width:150px;;
    background:black;
    float:left;
    padding:10px 0px;
    box-sizing:border-box;
    font-size:20px;
    border-radius:10px;
    margin-left:40px;
  }
  </style>
</head>
<body>
  <h1>Login Form</h1>
  <div id='form'>
    <p>Please login to your account</p>
    <br>
    <input type="email" placeholder="Email"/>
    <br><br>
    <input type="password" placeholder="Password"/>
    <br><br>
    <a href='#' id='forget'>Forget Password?</a>
    <br><br>
    <button>Login</button>
    <br><br>
    <p>or</p>
    <div id='box'>
      <div class='box1'>Google</div>
      <div class='box2'>Facebook</div>
    </div>
    <br>
    New Here?<a href='#'>Create an Account</a>
  </div>
  <form>
    
  </form>
</body>
</html>
