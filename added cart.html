<html>
<head>
  <style>
  h1{
    color:orange;
    text-align:center;
    margin-top:20px;
  }
  div{
    min-height:100px;
    background:aqua;
    margin:10px auto;
    border-radius:10px;
    padding:10px 15px;
    box-sizing:border-box;
  }
  div button{
    color:white;
    background:red;
    margin-top:5px;
    margin-bottom:10px;
    border:none;
    border-radius:10px;
    padding:8px 13px;
    box-sizing:border-box;
    font-size:18px;
    float:right;
  }
  
  </style>
</head>
<body>
  <h1>Your Added Cart</h1>
  <script>
  let body=document.querySelector('body')
  let response=localStorage.getItem('cartItems')
  //console.log(response,typeof response)
  let data=JSON.parse(response)
  data.forEach((item,index)=>{
    let box=document.createElement('div')
    body.append(box)
    box.innerHTML=`<b style='color:orange; font-size:20px;'>${item.name}</b>` + '<br>' + `<b style='color:green; font-size:25px;'>${item.cost}</b>`
    let delBtn=document.createElement('button')
    box.append(delBtn)
    delBtn.innerText='Delete'
    delBtn.addEventListener('click',()=>{
      data.splice(index,1)
      localStorage.setItem('cartItems',JSON.stringify(data))
      box.remove()
    })
  })
  </script>
</body>
</html>
